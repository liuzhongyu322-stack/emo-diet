    <!-- 登录/注册弹窗 -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <div id="loginView">
                <h2>🔐 登录饿魔</h2>
                <p>登录后数据可云端同步</p>
                
                <!-- 登录方式切换 -->
                <div style="display:flex;gap:10px;margin:15px 0;">
                    <button onclick="switchAuthTab('email')" id="authTabEmail" style="flex:1;padding:10px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:14px;">邮箱登录</button>
                    <button onclick="switchAuthTab('phone')" id="authTabPhone" style="flex:1;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:14px;">手机登录</button>
                </div>
                
                <!-- 邮箱登录 -->
                <div id="emailAuthForm">
                    <input type="email" id="loginEmail" placeholder="邮箱">
                    <input type="password" id="loginPassword" placeholder="密码" style="margin-top:10px;">
                    <button onclick="doEmailLogin()" style="width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;margin-top:15px;cursor:pointer;">登录</button>
                </div>
                
                <!-- 手机登录 -->
                <div id="phoneAuthForm" style="display:none;">
                    <input type="tel" id="loginPhone" placeholder="手机号" maxlength="11">
                    <div style="display:flex;gap:10px;margin-top:10px;">
                        <input type="text" id="loginCode" placeholder="验证码" maxlength="6" style="flex:1;">
                        <button onclick="sendLoginCode()" id="sendCodeBtn" style="padding:10px 15px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:14px;white-space:nowrap;">获取验证码</button>
                    </div>
                    <button onclick="doPhoneLogin()" style="width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;margin-top:15px;cursor:pointer;">登录</button>
                </div>
                
                <p id="authError" class="error"></p>
                
                <div style="margin-top:20px;text-align:center;">
                    <p style="font-size:13px;color:var(--text-light);margin-bottom:10px;">还没有账号？</p>
                    <button onclick="showRegisterView()" style="padding:10px 20px;background:transparent;border:1px solid var(--primary);color:var(--primary);border-radius:8px;font-size:14px;cursor:pointer;">立即注册</button>
                </div>
                
                <div style="margin-top:15px;padding-top:15px;border-top:1px solid var(--border);">
                    <button onclick="guestLogin()" style="width:100%;padding:10px;background:transparent;border:1px solid var(--border);color:var(--text-light);border-radius:12px;font-size:14px;cursor:pointer;">👤 游客模式（无需注册）</button>
                </div>
            </div>
            
            <div id="registerView" style="display:none;">
                <h2>📝 注册账号</h2>
                
                <!-- 注册方式切换 -->
                <div style="display:flex;gap:10px;margin:15px 0;">
                    <button onclick="switchRegTab('email')" id="regTabEmail" style="flex:1;padding:10px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:14px;">邮箱注册</button>
                    <button onclick="switchRegTab('phone')" id="regTabPhone" style="flex:1;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:14px;">手机注册</button>
                </div>
                
                <!-- 邮箱注册 -->
                <div id="emailRegForm">
                    <input type="text" id="regName" placeholder="昵称">
                    <input type="email" id="regEmail" placeholder="邮箱" style="margin-top:10px;">
                    <input type="password" id="regPassword" placeholder="密码（至少6位）" style="margin-top:10px;">
                    <input type="password" id="regPassword2" placeholder="确认密码" style="margin-top:10px;">
                    <button onclick="doEmailRegister()" style="width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;margin-top:15px;cursor:pointer;">注册</button>
                </div>
                
                <!-- 手机注册 -->
                <div id="phoneRegForm" style="display:none;">
                    <input type="text" id="regPhoneName" placeholder="昵称">
                    <input type="tel" id="regPhone" placeholder="手机号" maxlength="11" style="margin-top:10px;">
                    <div style="display:flex;gap:10px;margin-top:10px;">
                        <input type="text" id="regCode" placeholder="验证码" maxlength="6" style="flex:1;">
                        <button onclick="sendRegCode()" id="sendRegCodeBtn" style="padding:10px 15px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:14px;white-space:nowrap;">获取验证码</button>
                    </div>
                    <button onclick="doPhoneRegister()" style="width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;margin-top:15px;cursor:pointer;">注册</button>
                </div>
                
                <p id="regError" class="error"></p>
                
                <div style="margin-top:20px;text-align:center;">
                    <button onclick="showLoginView()" style="padding:10px 20px;background:transparent;border:none;color:var(--text-light);font-size:14px;cursor:pointer;">已有账号？去登录</button>
                </div>
            </div>
        </div>
    </div>
