<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饿魔 - 科学减脂</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- 登录弹窗 -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <div id="loginView">
                <h2>🔐 登录饿魔</h2>
                <div style="display:flex;gap:10px;margin:15px 0;">
                    <button onclick="switchAuthTab('email')" id="authTabEmail" style="flex:1;padding:10px;background:#5FB3A3;color:white;border:none;border-radius:8px;">邮箱登录</button>
                    <button onclick="switchAuthTab('phone')" id="authTabPhone" style="flex:1;padding:10px;background:#f5f5f5;border:1px solid #ddd;border-radius:8px;">手机登录</button>
                </div>
                <div id="emailAuthForm">
                    <input type="email" id="loginEmail" placeholder="邮箱" style="width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:8px;">
                    <input type="password" id="loginPassword" placeholder="密码" style="width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:8px;">
                    <button onclick="doEmailLogin()" style="width:100%;padding:14px;background:#5FB3A3;color:white;border:none;border-radius:12px;margin-top:10px;">登录</button>
                </div>
                <div id="phoneAuthForm" style="display:none;">
                    <input type="tel" id="loginPhone" placeholder="手机号" maxlength="11" style="width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:8px;">
                    <div style="display:flex;gap:10px;margin:5px 0;">
                        <input type="text" id="loginCode" placeholder="验证码" maxlength="6" style="flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;">
                        <button onclick="sendLoginCode()" id="sendCodeBtn" style="padding:12px;background:#f5f5f5;border:1px solid #ddd;border-radius:8px;">获取验证码</button>
                    </div>
                    <button onclick="doPhoneLogin()" style="width:100%;padding:14px;background:#5FB3A3;color:white;border:none;border-radius:12px;margin-top:10px;">登录</button>
                </div>
                <p id="authError" style="color:red;margin:10px 0;"></p>
                <div style="margin-top:20px;text-align:center;">
                    <button onclick="showRegisterView()" style="padding:10px 20px;background:transparent;border:1px solid #5FB3A3;color:#5FB3A3;border-radius:8px;">立即注册</button>
                </div>
                <div style="margin-top:15px;padding-top:15px;border-top:1px solid #ddd;">
                    <button onclick="guestLogin()" style="width:100%;padding:10px;background:transparent;border:1px solid #ddd;color:#666;border-radius:12px;">👤 游客模式</button>
                </div>
            </div>
            <div id="registerView" style="display:none;">
                <h2>📝 注册账号</h2>
                <div style="display:flex;gap:10px;margin:15px 0;">
                    <button onclick="switchRegTab('email')" id="regTabEmail" style="flex:1;padding:10px;background:#5FB3A3;color:white;border:none;border-radius:8px;">邮箱注册</button>
                    <button onclick="switchRegTab('phone')" id="regTabPhone" style="flex:1;padding:10px;background:#f5f5f5;border:1px solid #ddd;border-radius:8px;">手机注册</button>
                </div>
                <div id="emailRegForm">
                    <input type="text" id="regName" placeholder="昵称" style="width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:8px;">
                    <input type="email" id="regEmail" placeholder="邮箱" style="width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:8px;">
                    <input type="password" id="regPassword" placeholder="密码" style="width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:8px;">
                    <input type="password" id="regPassword2" placeholder="确认密码" style="width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:8px;">
                    <button onclick="doEmailRegister()" style="width:100%;padding:14px;background:#5FB3A3;color:white;border:none;border-radius:12px;margin-top:10px;">注册</button>
                </div>
                <div id="phoneRegForm" style="display:none;">
                    <input type="text" id="regPhoneName" placeholder="昵称" style="width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:8px;">
                    <input type="tel" id="regPhone" placeholder="手机号" maxlength="11" style="width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:8px;">
                    <div style="display:flex;gap:10px;margin:5px 0;">
                        <input type="text" id="regCode" placeholder="验证码" maxlength="6" style="flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;">
                        <button onclick="sendRegCode()" id="sendRegCodeBtn" style="padding:12px;background:#f5f5f5;border:1px solid #ddd;border-radius:8px;">获取验证码</button>
                    </div>
                    <button onclick="doPhoneRegister()" style="width:100%;padding:14px;background:#5FB3A3;color:white;border:none;border-radius:12px;margin-top:10px;">注册</button>
                </div>
                <p id="regError" style="color:red;margin:10px 0;"></p>
                <button onclick="showLoginView()" style="width:100%;padding:10px;background:transparent;border:none;color:#666;margin-top:10px;">已有账号？去登录</button>
            </div>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="mainApp" class="hidden">
        <h1 style="text-align:center;padding:50px;">饿魔 - 科学减脂</h1>
        <p style="text-align:center;">登录成功！欢迎使用饿魔。</p>
        <button onclick="logout()" style="display:block;margin:20px auto;padding:10px 20px;background:#5FB3A3;color:white;border:none;border-radius:8px;">退出登录</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
   </div>

    <script src="app.js"></script>
</body>
</html>
